name: Deploy to GCP VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Type check
        run: npx tsc --noEmit

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "→ Pulling latest code"
            if [ -d ~/food-and-health-app ]; then
              cd ~/food-and-health-app && git pull origin main
            else
              git clone https://github.com/aniketsingh1023/food-and-health-app.git ~/food-and-health-app
              cd ~/food-and-health-app
            fi

            echo "→ Writing env file"
            cat > ~/food-and-health-app/web/.env.local << ENVEOF
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            NEXT_PUBLIC_APP_URL=https://nutriai.anik8.me
            ENVEOF

            echo "→ Installing dependencies"
            cd ~/food-and-health-app/web
            npm ci

            echo "→ Building app"
            npm run build

            echo "→ Restarting with PM2"
            pm2 describe nutriai > /dev/null 2>&1 \
              && pm2 restart nutriai \
              || pm2 start npm --name nutriai -- start

            pm2 save
            echo "✓ Deploy complete"
